<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Sweet Love 💕</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
}

/* ===== 梦幻渐变背景 ===== */
body {
  background: linear-gradient(135deg, #ffd9e7 0%, #e8d5ff 25%, #d5e8ff 50%, #ffd9e7 75%, #ffe7f0 100%);
  background-size: 400% 400%;
  animation: gradientShift 10s ease infinite;
}
@keyframes gradientShift {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

/* ===== 樱花飘落 ===== */
.sakura {
  position: fixed; top: -30px; z-index: 1;
  pointer-events: none;
  animation: fall linear forwards;
  font-size: 20px;
  opacity: 0.8;
}
@keyframes fall {
  to {
    transform: translateY(110vh) rotate(720deg);
    opacity: 0.3;
  }
}

/* ===== 粒子画布 ===== */
#particle-canvas {
  position: fixed; inset: 0; z-index: 2;
  pointer-events: none;
}

/* ===== 页面容器 ===== */
.pages {
  position: fixed; inset: 0;
  display: flex;
  transition: transform 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
}
.page {
  min-width: 100%; height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.5s;
}
.page.active {
  opacity: 1;
}

/* ===== 首页 ===== */
#page-home {
  text-align: center;
}
#title-text {
  font-size: clamp(32px, 8vw, 72px);
  font-weight: bold;
  background: linear-gradient(90deg, #ff6b9d, #ff9a9e, #fecfef, #ff9a9e);
  background-size: 300% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: shimmer 2s linear infinite;
  margin-bottom: 40px;
  min-height: 1.2em;
}
@keyframes shimmer {
  to { background-position: 300% center; }
}

/* 跳动爱心 */
.heart-btn {
  width: clamp(120px, 25vw, 200px);
  height: clamp(120px, 25vw, 200px);
  background: linear-gradient(135deg, #ff6b9d, #ff9a9e);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(60px, 15vw, 100px);
  cursor: pointer;
  animation: heartbeat 1s ease-in-out infinite;
  border-radius: 50%;
  box-shadow: 0 10px 40px rgba(255, 107, 157, 0.5);
  transition: transform 0.3s;
  position: relative;
  z-index: 10;
}
.heart-btn:hover {
  transform: scale(1.1);
}
.heart-btn::before {
  content: '';
  position: absolute;
  inset: -10px;
  border-radius: 50%;
  background: inherit;
  filter: blur(20px);
  opacity: 0.5;
  animation: pulse 1s ease-in-out infinite;
  z-index: -1;
}
@keyframes heartbeat {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.08); }
}
@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 0.5; }
  50% { transform: scale(1.2); opacity: 0.3; }
}

/* ===== 相册页 ===== */
#page-gallery h2, #page-message h2, #page-timer h2, #page-surprise h2 {
  font-size: clamp(24px, 5vw, 42px);
  color: #ff6b9d;
  margin-bottom: 30px;
  text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.8);
}

.carousel-container {
  perspective: 1000px;
  width: clamp(280px, 70vw, 500px);
  height: clamp(350px, 60vh, 600px);
  position: relative;
}
.carousel {
  width: 100%; height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
}
.carousel-item {
  position: absolute;
  width: 100%; height: 100%;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
  cursor: pointer;
  backface-visibility: visible;
}
.carousel-item img {
  width: 100%; height: 100%;
  object-fit: cover;
  transition: transform 0.3s;
}
.carousel-item:hover img {
  transform: scale(1.05);
}
.carousel-nav {
  display: flex;
  justify-content: center;
  gap: 30px;
  margin-top: 30px;
}
.nav-btn {
  width: 50px; height: 50px;
  border-radius: 50%;
  border: none;
  background: linear-gradient(135deg, #ff6b9d, #ff9a9e);
  color: white;
  font-size: 24px;
  cursor: pointer;
  box-shadow: 0 5px 20px rgba(255, 107, 157, 0.4);
  transition: transform 0.2s, box-shadow 0.2s;
}
.nav-btn:hover {
  transform: scale(1.1);
  box-shadow: 0 8px 30px rgba(255, 107, 157, 0.6);
}
.nav-btn:active {
  transform: scale(0.95);
}

/* 照片放大模态框 */
.lightbox {
  display: none;
  position: fixed; inset: 0;
  z-index: 9999;
  background: rgba(0, 0, 0, 0.9);
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.3s;
}
.lightbox.show {
  display: flex;
  opacity: 1;
}
.lightbox img {
  max-width: 90vw;
  max-height: 90vh;
  border-radius: 10px;
  box-shadow: 0 0 50px rgba(255, 107, 157, 0.5);
}
.lightbox-close {
  position: absolute;
  top: 20px; right: 30px;
  font-size: 40px;
  color: white;
  cursor: pointer;
  z-index: 10000;
}

/* ===== 留言板页 ===== */
.envelope-container {
  perspective: 1000px;
  cursor: grab;
  user-select: none;
  position: relative;
  z-index: 100;
}
.envelope {
  width: clamp(200px, 50vw, 300px);
  height: clamp(140px, 35vw, 200px);
  background: linear-gradient(135deg, #ffb6c1, #ff69b4);
  border-radius: 10px;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 15px 40px rgba(255, 105, 180, 0.4);
  transition: transform 0.3s;
}
.envelope::before {
  content: '💌';
  font-size: clamp(50px, 12vw, 80px);
}
.envelope.open {
  transform: rotateX(180deg);
}
.letter {
  display: none;
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%) scale(0.8);
  width: clamp(280px, 80vw, 500px);
  min-height: clamp(300px, 60vh, 400px);
  max-height: 80vh;
  overflow-y: auto;
  background: linear-gradient(135deg, #fff5f8, #fff);
  border-radius: 20px;
  padding: 40px;
  box-shadow: 0 20px 60px rgba(255, 105, 180, 0.4);
  z-index: 1000;
  opacity: 0;
  transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
}
.letter.show {
  display: block;
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
}
.letter-content {
  font-size: clamp(16px, 3.5vw, 20px);
  line-height: 1.8;
  color: #ff6b9d;
  white-space: pre-wrap;
}
.letter-close {
  position: absolute;
  top: 15px; right: 20px;
  font-size: 30px;
  color: #ff6b9d;
  cursor: pointer;
}

/* 气球 */
.balloon {
  position: fixed;
  bottom: -100px;
  font-size: 30px;
  pointer-events: none;
  animation: floatUp 15s linear forwards;
  z-index: 5;
}
@keyframes floatUp {
  0% { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(-120vh) rotate(20deg); opacity: 0.3; }
}

/* ===== 计时器页 ===== */
.timer-container {
  text-align: center;
}
.timer-text {
  font-size: clamp(18px, 4vw, 28px);
  color: #ff6b9d;
  margin-bottom: 20px;
}
.timer-days {
  font-size: clamp(48px, 12vw, 100px);
  font-weight: bold;
  background: linear-gradient(135deg, #ff6b9d, #ff9a9e, #fecfef);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: breathe 2s ease-in-out infinite;
}
@keyframes breathe {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.05); opacity: 0.9; }
}

/* 点我亲亲按钮 */
.kiss-btn {
  margin-top: 30px;
  padding: 15px 40px;
  font-size: clamp(16px, 4vw, 20px);
  border: none;
  border-radius: 50px;
  background: linear-gradient(135deg, #ff6b9d, #ff9a9e);
  color: white;
  cursor: pointer;
  box-shadow: 0 10px 30px rgba(255, 107, 157, 0.4);
  transition: transform 0.2s, box-shadow 0.2s;
  animation: btnPulse 2s ease-in-out infinite;
}
.kiss-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 15px 40px rgba(255, 107, 157, 0.6);
}
@keyframes btnPulse {
  0%, 100% { box-shadow: 0 10px 30px rgba(255, 107, 157, 0.4); }
  50% { box-shadow: 0 15px 40px rgba(255, 107, 157, 0.6); }
}

/* 亲吻动画 */
.kiss-overlay {
  display: none;
  position: fixed; inset: 0;
  z-index: 9998;
  background: rgba(255, 182, 193, 0.9);
  align-items: center;
  justify-content: center;
  flex-direction: column;
}
.kiss-overlay.show {
  display: flex;
  animation: kissFade 2s ease-out forwards;
}
@keyframes kissFade {
  0% { opacity: 1; }
  100% { opacity: 0; }
}
.kiss-photo {
  max-width: 70vw;
  max-height: 60vh;
  border-radius: 20px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
  animation: kissPhoto 1.5s ease-out;
}
@keyframes kissPhoto {
  0% { transform: scale(0) rotate(-10deg); }
  50% { transform: scale(1.1) rotate(5deg); }
  100% { transform: scale(1) rotate(0deg); }
}
.kiss-text {
  margin-top: 30px;
  font-size: clamp(32px, 8vw, 60px);
  color: #ff6b9d;
  animation: kissPop 0.5s ease-out;
}
@keyframes kissPop {
  0% { transform: scale(0); }
  50% { transform: scale(1.2); }
  100% { transform: scale(1); }
}

/* ===== 惊喜页 ===== */
#page-surprise {
  position: relative;
}
.surprise-btn {
  padding: clamp(20px, 5vw, 30px) clamp(40px, 10vw, 80px);
  font-size: clamp(18px, 4.5vw, 28px);
  border: none;
  border-radius: 50px;
  background: linear-gradient(135deg, #ff6b9d, #ff9a9e, #fecfef);
  color: white;
  cursor: pointer;
  box-shadow: 0 15px 50px rgba(255, 107, 157, 0.5);
  animation: surprisePulse 2s ease-in-out infinite, rotateSparkle 5s linear infinite;
  position: relative;
  overflow: hidden;
  transition: transform 0.3s;
}
.surprise-btn:hover {
  transform: scale(1.1);
}
@keyframes surprisePulse {
  0%, 100% { box-shadow: 0 15px 50px rgba(255, 107, 157, 0.5); }
  50% { box-shadow: 0 25px 70px rgba(255, 107, 157, 0.8); }
}
@keyframes rotateSparkle {
  0% { filter: hue-rotate(0deg); }
  100% { filter: hue-rotate(360deg); }
}
.surprise-btn::after {
  content: '✨💖✨';
  margin-left: 10px;
}
.surprise-btn.broken {
  animation: breakApart 0.8s ease-out forwards;
}
@keyframes breakApart {
  0% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.2); opacity: 0.8; }
  100% { transform: scale(2); opacity: 0; }
}

/* 惊喜遮罩 */
.surprise-overlay {
  display: none;
  position: fixed; inset: 0;
  z-index: 9997;
  background: radial-gradient(ellipse at center, rgba(255, 182, 193, 0.3) 0%, rgba(232, 213, 255, 0.7) 100%);
  align-items: center;
  justify-content: center;
  flex-direction: column;
}
.surprise-overlay.show {
  display: flex;
}
.surprise-photo {
  max-width: 60vw;
  max-height: 50vh;
  border-radius: 20px;
  box-shadow: 0 30px 80px rgba(255, 107, 157, 0.6);
  animation: photoReveal 1s ease-out;
}
@keyframes photoReveal {
  0% { transform: scale(0); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}
.surprise-message {
  margin-top: 40px;
  font-size: clamp(20px, 5vw, 36px);
  background: linear-gradient(90deg, #ff6b9d, #ff9a9e, #fecfef, #d5e8ff);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: messageShimmer 3s linear infinite;
  font-style: italic;
  font-weight: bold;
}
@keyframes messageShimmer {
  to { background-position: 200% center; }
}

/* ===== 底部导航 ===== */
.bottom-nav {
  position: fixed;
  bottom: 20px; left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 10px;
  z-index: 1000;
  padding: 10px 20px;
  background: rgba(255, 255, 255, 0.3);
  backdrop-filter: blur(10px);
  border-radius: 50px;
  box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
}
.nav-dot {
  width: 12px; height: 12px;
  border-radius: 50%;
  background: rgba(255, 107, 157, 0.5);
  cursor: pointer;
  transition: all 0.3s;
}
.nav-dot.active {
  background: #ff6b9d;
  transform: scale(1.3);
}
.nav-dot:hover {
  transform: scale(1.2);
}
</style>
</head>

<script>
// ===== 音效 (使用免费 CDN) =====
const SFX = {
  pop: 'https://cdn.pixabay.com/download/audio/2021/08/04/audio_06d5e7f8d5.mp3?filename=pop-102244.mp3',
  whoosh: 'https://cdn.pixabay.com/download/audio/2021/08/04/audio_2a8c08e0e8.mp3?filename=whoosh-86919.mp3',
  kiss: 'https://cdn.pixabay.com/download/audio/2022/03/10/audio_5a30e27f99.mp3?filename=kiss-6466.mp3',
  chime: 'https://cdn.pixabay.com/download/audio/2021/08/04/audio_5f2a8f7f6f.mp3?filename=chime-5449.mp3',
  explode: 'https://cdn.pixabay.com/download/audio/2022/03/24/audio_5e5e5a5f5f.mp3?filename=magical-impact-54551.mp3',
  ding: 'https://cdn.pixabay.com/download/audio/2021/08/04/audio_3d4e5f6f5f.mp3?filename=ding-5625.mp3'
};

function playSfx(url) {
  const audio = new Audio(url);
  audio.volume = 0.5;
  audio.play().catch(() => {});
}

// 背景音乐
const bgm = document.getElementById('bgm');

// ===== 樱花飘落 =====
function createSakura() {
  const sakura = document.createElement('div');
  sakura.className = 'sakura';
  sakura.textContent = ['🌸', '🌺', '🌷', '🌹'][Math.floor(Math.random() * 4)];
  sakura.style.left = Math.random() * 100 + 'vw';
  sakura.style.animationDuration = (8 + Math.random() * 5) + 's';
  sakura.style.fontSize = (15 + Math.random() * 15) + 'px';
  document.getElementById('sakura-container').appendChild(sakura);
  setTimeout(() => sakura.remove(), 15000);
}
setInterval(createSakura, 400);

// ===== 粒子动画 =====
const canvas = document.getElementById('particle-canvas');
const ctx = canvas.getContext('2d');
let W, H, particles = [];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

class Particle {
  constructor() {
    this.reset();
  }
  reset() {
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.vx = (Math.random() - 0.5) * 2;
    this.vy = (Math.random() - 0.5) * 2;
    this.size = Math.random() * 4 + 1;
    this.color = [`rgba(255, 107, 157,`, `rgba(232, 213, 255,`, `rgba(213, 232, 255,`][Math.floor(Math.random() * 3)];
    this.alpha = Math.random() * 0.5 + 0.3;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    if (this.x < 0 || this.x > W) this.vx *= -1;
    if (this.y < 0 || this.y > H) this.vy *= -1;
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = this.color + this.alpha + ')';
    ctx.fill();
  }
}

for (let i = 0; i < 80; i++) particles.push(new Particle());

function animate() {
  ctx.clearRect(0, 0, W, H);
  particles.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(animate);
}
animate();

// ===== 气球 =====
function createBalloon() {
  const balloon = document.createElement('div');
  balloon.className = 'balloon';
  balloon.textContent = ['🎈', '💖', '⭐', '🌸'][Math.floor(Math.random() * 4)];
  balloon.style.left = Math.random() * 100 + 'vw';
  balloon.style.animationDuration = (12 + Math.random() * 6) + 's';
  document.body.appendChild(balloon);
  setTimeout(() => balloon.remove(), 20000);
}
setInterval(createBalloon, 2000);

// ===== 打字机效果 =====
const titleText = "My Sweet Love 💕";
const titleEl = document.getElementById('title-text');
let titleIdx = 0;

function typeTitle() {
  if (titleIdx < titleText.length) {
    titleEl.textContent += titleText[titleIdx];
    titleIdx++;
    setTimeout(typeTitle, 200);
  }
}
typeTitle();

// ===== 页面切换 =====
let currentPage = 0;
const totalPages = 5;
const pages = document.getElementById('pages');
const pageEls = document.querySelectorAll('.page');
const dots = document.querySelectorAll('.nav-dot');
const bottomNav = document.getElementById('bottom-nav');

function goToPage(n) {
  if (n < 0 || n >= totalPages) return;
  currentPage = n;
  pages.style.transform = `translateX(-${n * 100}%)`;
  pageEls.forEach((p, i) => p.classList.toggle('active', i === n));
  dots.forEach((d, i) => d.classList.toggle('active', i === n));
  
  // 显示导航
  if (n > 0) {
    bottomNav.style.display = 'flex';
  }
  
  // 启动气球
  if (n === 2) {
    setInterval(createBalloon, 1000);
  }
}

// 进入按钮
document.getElementById('enter-btn').addEventListener('click', () => {
  bgm.volume = 0.4;
  bgm.play().catch(() => {});
  playSfx(SFX.chime);
  goToPage(1);
});

// 导航点
dots.forEach(dot => {
  dot.addEventListener('click', () => {
    playSfx(SFX.ding);
    goToPage(parseInt(dot.dataset.page));
  });
});

// _____carousel 相册轮播_____
let photoIdx = 0;
const carousel = document.getElementById('carousel');
const photos = ['photo1.jpg', 'photo2.jpg', 'photo3.jpg', 'photo4.jpg', 'photo5.jpg'];

function updateCarousel() {
  const angle = photoIdx * -72;
  carousel.style.transform = `rotateY(${angle}deg)`;
  playSfx(SFX.pop);
}

document.getElementById('prev-btn').addEventListener('click', () => {
  photoIdx = (photoIdx - 1 + 5) % 5;
  updateCarousel();
});

document.getElementById('next-btn').addEventListener('click', () => {
  photoIdx = (photoIdx + 1) % 5;
  updateCarousel();
});

// 照片放大
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightbox-img');

document.querySelectorAll('.carousel-item img').forEach(img => {
  img.addEventListener('click', () => {
    lightboxImg.src = img.src;
    lightbox.classList.add('show');
    playSfx(SFX.whoosh);
  });
});

document.getElementById('lightbox-close').addEventListener('click', () => {
  lightbox.classList.remove('show');
});

// ===== 信封拖拽 + 打开 =====
const envelope = document.getElementById('envelope');
const envelopeContainer = document.getElementById('envelope-container');
const letter = document.getElementById('letter');
let isDragging = false, startX, startY, elX = 0, elY = 0;

envelopeContainer.addEventListener('mousedown', startDrag);
envelopeContainer.addEventListener('touchstart', startDrag);

function startDrag(e) {
  isDragging = true;
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  startX = clientX - elX;
  startY = clientY - elY;
  envelopeContainer.classList.add('dragging');
}

document.addEventListener('mousemove', drag);
document.addEventListener('touchmove', drag);

function drag(e) {
  if (!isDragging) return;
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  elX = clientX - startX;
  elY = clientY - startY;
  
  // 限制范围
  elX = Math.max(-window.innerWidth/2, Math.min(window.innerWidth/2, elX));
  elY = Math.max(-window.innerHeight/2, Math.min(window.innerHeight/2, elY));
  
  envelopeContainer.style.transform = `translate(${elX}px, ${elY}px)`;
}

document.addEventListener('mouseup', endDrag);
document.addEventListener('touchend', endDrag);

function endDrag() {
  isDragging = false;
}

envelope.addEventListener('click', () => {
  if (isDragging) return;
  envelope.classList.add('open');
  letter.classList.add('show');
  playSfx(SFX.whoosh);
});

document.getElementById('letter-close').addEventListener('click', () => {
  letter.classList.remove('show');
  envelope.classList.remove('open');
});

// ===== 爱情计时器 =====
const startDate = new Date('2025-10-20');
const timerDaysEl = document.getElementById('timer-days');

function updateTimer() {
  const now = new Date();
  const diff = now - startDate;
  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  timerDaysEl.textContent = days;
}
updateTimer();
setInterval(updateTimer, 1000 * 60 * 60); // 每小时更新

// 点我亲亲
const kissOverlay = document.getElementById('kiss-overlay');
const kissPhoto = document.getElementById('kiss-photo');

document.getElementById('kiss-btn').addEventListener('click', () => {

// ===== 惊喜按钮 =====
const surpriseBtn = document.getElementById('surprise-btn');
const surpriseOverlay = document.getElementById('surprise-overlay');
const surprisePhoto = document.getElementById('surprise-photo');

surpriseBtn.addEventListener('click', () => {
  playSfx(SFX.explode);
  
  // 按钮破碎
  surpriseBtn.classList.add('broken');
  
  // 创建爱心粒子
  for (let i = 0; i < 30; i++) {
    setTimeout(() => {
      const heart = document.createElement('div');
      heart.textContent = '💖';
      heart.style.cssText = `
        position: fixed;
        left: ${50 + (Math.random() - 0.5) * 20}vw;
        top: 50%;
        font-size: ${20 + Math.random() * 30}px;
        pointer-events: none;
        animation: heartFly 1.5s ease-out forwards;
        z-index: 9999;
      `;
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 1500);
    }, i * 30);
  }
  
  // 显示惊喜
  setTimeout(() => {
    surprisePhoto.src = 'photo' + (Math.floor(Math.random() * 5) + 1) + '.jpg';
    surpriseOverlay.classList.add('show');
  }, 500);
  
  // 隐藏按钮
  setTimeout(() => {
    surpriseBtn.style.display = 'none';
  }, 800);
});

// 添加爱心飞散动画 CSS
const style = document.createElement('style');
style.textContent = `
@keyframes heartFly {
  0% { transform: translate(0, 0) scale(0.5); opacity: 1; }
  100% { transform: translate(${Math.random() * 200 - 100}px, ${Math.random() * 300 - 150}px) scale(1.5); opacity: 0; }
}
`;
document.head.appendChild(style);
</script>
